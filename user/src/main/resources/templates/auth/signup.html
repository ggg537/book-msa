<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="ko">

<head>
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>
<div layout:fragment="content">

    <div class="auth-wrap">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-icon">✏️</div>
                <h1 class="auth-title">회원가입</h1>
                <p class="auth-subtitle">BookService 회원이 되어보세요</p>
            </div>

            <form id="signupForm" novalidate>

                <!-- 이메일 -->
                <div class="form-group">
                    <label class="form-label" for="email">
                        이메일 <span class="required">*</span>
                    </label>
                    <div class="input-check-wrap">
                        <input type="email"
                               id="email"
                               class="form-input"
                               placeholder="이메일을 입력하세요"
                               autocomplete="email">
                        <button type="button" class="btn btn-outline" id="checkEmailBtn">
                            중복 확인
                        </button>
                    </div>
                    <span class="form-hint" id="emailHint"></span>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group">
                    <label class="form-label" for="password">
                        비밀번호 <span class="required">*</span>
                    </label>
                    <div class="input-wrap">
                        <input type="password"
                               id="password"
                               class="form-input"
                               placeholder="8자 이상 입력하세요"
                               autocomplete="new-password">
                        <button type="button" class="btn-eye" id="togglePw" tabindex="-1">👁</button>
                    </div>
                    <span class="form-hint" id="passwordHint"></span>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="form-group">
                    <label class="form-label" for="passwordConfirm">
                        비밀번호 확인 <span class="required">*</span>
                    </label>
                    <input type="password"
                           id="passwordConfirm"
                           class="form-input"
                           placeholder="비밀번호를 다시 입력하세요"
                           autocomplete="new-password">
                    <span class="form-hint" id="passwordConfirmHint"></span>
                </div>

                <!-- 이름 -->
                <div class="form-group">
                    <label class="form-label" for="name">
                        이름 <span class="required">*</span>
                    </label>
                    <input type="text"
                           id="name"
                           class="form-input"
                           placeholder="이름을 입력하세요">
                    <span class="form-hint" id="nameHint"></span>
                </div>

                <!-- 닉네임 -->
                <div class="form-group">
                    <label class="form-label" for="nickname">
                        닉네임 <span class="required">*</span>
                    </label>
                    <div class="input-check-wrap">
                        <input type="text"
                               id="nickname"
                               class="form-input"
                               placeholder="최대 50자">
                        <button type="button" class="btn btn-outline" id="checkNicknameBtn">
                            중복 확인
                        </button>
                    </div>
                    <span class="form-hint" id="nicknameHint"></span>
                </div>

                <!-- 전화번호 -->
                <div class="form-group">
                    <label class="form-label" for="phone">전화번호</label>
                    <input type="tel"
                           id="phone"
                           class="form-input"
                           placeholder="숫자만 입력 (예: 01012345678)">
                    <span class="form-hint" id="phoneHint"></span>
                </div>

                <button type="submit" class="btn-submit" id="signupBtn">
                    회원가입
                </button>

            </form>

            <div class="divider">또는</div>

            <p class="auth-footer-text">
                이미 계정이 있으신가요?
                <a href="/login" class="auth-link">로그인</a>
            </p>

        </div>
    </div>

</div>

<th:block layout:fragment="script">
    <script th:src="@{/js/signup.js}"></script>
</th:block>

</body>
</html>
